<style>

  header{position:sticky;top:0;z-index:50;height:60px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#2563eb,#4f46e5);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
  .brand{font-weight:800;font-size:18px;background:linear-gradient(90deg,#2563eb,#4f46e5);-webkit-background-clip:text;background-clip:text;color:transparent}
  .badge{font-size:11px;padding:2px 8px;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-weight:600}
  .wrap{display:flex;min-height:calc(100vh - 60px)}
  aside{width:230px;background:var(--card);border-right:1px solid var(--border);padding:12px;flex-shrink:0}
  nav button{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border:none;background:none;color:var(--muted-fg);border-radius:9px;cursor:pointer;font-size:14px;font-weight:500;text-align:left;transition:.15s}
  nav button:hover{background:var(--muted);color:var(--fg)}
  nav button.active{background:#eff6ff;color:#1d4ed8;font-weight:700}
  @media (prefers-color-scheme: dark){nav button.active{background:#1e3a5f;color:#93c5fd}}
  main{flex:1;padding:24px;overflow-x:hidden}
  /* Components */
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
  .g3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
  .g4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
  h1{font-size:28px;font-weight:800;margin-bottom:6px}
  h2{font-size:22px;font-weight:800}
  h3{font-size:16px;font-weight:700;margin-bottom:14px}
  .sub{color:var(--muted-fg);margin-bottom:20px}
  .stat{padding:16px;border-radius:12px;border:1px solid var(--border)}
  .stat .lbl{font-size:12px;opacity:.8}.stat .val{font-size:22px;font-weight:800;margin-top:4px}
  .btn{padding:10px 18px;border-radius:10px;border:none;font-weight:600;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:.15s}
  .btn-primary{background:linear-gradient(90deg,#2563eb,#4f46e5);color:#fff}.btn-primary:hover{filter:brightness(1.08)}
  .btn-primary:disabled{background:#cbd5e1;cursor:not-allowed;filter:none}
  .btn-green{background:var(--green);color:#fff}.btn-ghost{background:var(--muted);color:var(--fg)}
  input,select{padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--fg);font-size:14px;width:100%}
  input:focus,select:focus{outline:2px solid var(--primary);border-color:transparent}
  label{font-size:13px;font-weight:600;display:block;margin-bottom:6px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead tr{background:var(--muted);text-align:left}
  th,td{padding:10px 12px}
  tbody tr{border-top:1px solid var(--border)}tbody tr:hover{background:var(--muted)}
  .tr{text-align:right}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;text-transform:capitalize}
  .dropzone{border:2px dashed var(--border);border-radius:14px;padding:48px 20px;text-align:center;cursor:pointer;transition:.2s;position:relative}
  .dropzone:hover,.dropzone.drag{border-color:var(--primary);background:#eff6ff}
  @media (prefers-color-scheme: dark){.dropzone:hover,.dropzone.drag{background:#1e3a5f}}
  .dropzone.has{border-color:var(--green);background:#f0fdf4}
  @media (prefers-color-scheme: dark){.dropzone.has{background:#052e16}}
  .bar{height:10px;background:var(--muted);border-radius:999px;overflow:hidden}
  .bar>div{height:100%;border-radius:999px;transition:width .6s}
  .src-card{padding:16px;border:2px solid var(--border);border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:.15s}
  .src-card.sel-cpwd{border-color:var(--primary);background:#eff6ff}.src-card.sel-bihar{border-color:var(--green);background:#f0fdf4}
  @media (prefers-color-scheme: dark){.src-card.sel-cpwd{background:#1e3a5f}.src-card.sel-bihar{background:#052e16}}
  .hidden{display:none}
  .fade{animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .spinner{width:18px;height:18px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .note{padding:14px;border-radius:10px;font-size:13px;margin-top:16px}
  .note-blue{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
  .note-amber{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
  @media (prefers-color-scheme: dark){.note-blue{background:#1e3a5f;color:#bfdbfe;border-color:#1e40af}.note-amber{background:#422006;color:#fde68a;border-color:#92400e}}
  .qa{padding:22px;border-radius:14px;color:#fff;cursor:pointer;border:none;text-align:left;transition:.2s}
  .qa:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,0,0,.15)}
  .qa h4{font-size:18px;font-weight:700;margin:10px 0 4px}.qa p{font-size:13px;opacity:.9}
  .legend{display:flex;align-items:center;gap:6px;font-size:12px}.dot{width:11px;height:11px;border-radius:50%}
  @media(max-width:760px){aside{position:fixed;left:-230px;height:100%;z-index:60;transition:.3s}aside.open{left:0}main{padding:16px}}

/* ---------- MATERIAL CALCULATION ENGINE (grade / thickness / mix aware) ---------- */
const round2=n=>Math.round(n*100)/100;
// Concrete grade -> nominal mix ratio [fine, coarse]; M25+ use design-based quantities
const GRADE_RATIO={M5:[5,10],"M7.5":[4,8],M10:[3,6],M15:[2,4],M20:[1.5,3]};
const GRADE_DESIGN={M25:{cement:8.6,sand:0.41,agg:0.81},M30:{cement:9.6,sand:0.39,agg:0.77},M35:{cement:10.5,sand:0.37,agg:0.74},M40:{cement:11.2,sand:0.35,agg:0.71}};
// Materials per 1 cum of concrete from nominal mix 1:a:b (dry factor 1.54, cement 1440 kg/m3, 50kg bag => 28.8 bags/cum)
function concreteFromRatio(a,b){const DRY=1.54,sum=1+a+b;return{cement:(DRY/sum)*28.8,sand:DRY*a/sum,agg:DRY*b/sum};}
function parseConcrete(d){
  const r=d.match(/1\s*:\s*([\d.]+)\s*:\s*([\d.]+)/); // explicit mix e.g. 1:2:4
  if(r)return concreteFromRatio(parseFloat(r[1]),parseFloat(r[2]));
  const g=d.match(/\bm[\s-]?(5|7\.5|10|15|20|25|30|35|40)\b/); // grade e.g. M-20
  if(g){const grade="M"+g[1];if(GRADE_DESIGN[grade])return GRADE_DESIGN[grade];if(GRADE_RATIO[grade]){const[a,b]=GRADE_RATIO[grade];return concreteFromRatio(a,b);}}
  return concreteFromRatio(1.5,3); // default to M20
}
// Cement(bags)/sand(cum) per 1 cum of WET cement mortar for ratio 1:r (dry factor 1.3)
function mortarPerCum(r){const DRY=1.3,c=DRY/(1+r);return{cement:c*28.8,sand:DRY*r/(1+r)};}
function parseRatio(d,def){const m=d.match(/1\s*:\s*(\d+(?:\.\d+)?)(?!\s*:)/);return m?parseFloat(m[1]):def;}
function parseThickness(d,def){const m=d.match(/(\d{1,3})\s*mm/);return m?parseFloat(m[1]):def;}

// Returns array of {m:name, u:unit, qty, rk:rateKey, w:wastage%} for one BOQ work item
function getMaterials(it){
  const d=(it.description||"").toLowerCase(),q=it.quantity,o=[];
  const add=(m,u,qty,rk,w)=>{if(qty>0)o.push({m,u,qty,rk,w});};
  switch(it.category){
    case "concrete":{const mix=parseConcrete(d);const lean=/1\s*:\s*[45]\s*:|1\s*:\s*3\s*:|\bm[\s-]?(5|7\.5|10)\b|40\s*mm|lean|levelling|pcc/.test(d);
      add("Cement (OPC 43)","bag",q*mix.cement,"cement",2);
      add(lean?"Coarse Sand":"Coarse Sand","cum",q*mix.sand,"sand",10);
      add(lean?"Stone Aggregate 40mm":"Stone Aggregate 20mm","cum",q*mix.agg,lean?"agg40":"agg20",5);
      add("Water","kl",q*0.16,"water",0);
      if(/waterproof|dpc|damp proof/.test(d))add("Waterproofing Compound","kg",q*1.0,"primer",2);break;}
    case "masonry":{const r=parseRatio(d,6),mp=mortarPerCum(r);
      if(/aac/.test(d)){ // AAC block masonry
        if(it.unit==="sqm"){add("AAC Block 100mm",   "nos",q*8.4,"aacblock",4);add("Block Jointing Mortar","bag",q*0.06,"cement",5);}
        else{add("AAC Block 200mm","nos",q*36,"aacblock",4);add("Cement (OPC 43)","bag",q*0.5,"cement",3);add("Coarse Sand","cum",q*0.04,"sand",10);}break;}
      if(/rubble|stone masonry/.test(d)){add("Rubble Stone","cum",q*1.25,"stone",5);const mv=0.34;add("Cement (OPC 43)","bag",q*mv*mp.cement,"cement",3);add("Coarse Sand","cum",q*mv*mp.sand,"sand",10);break;}
      const half=/half brick|115|on edge/.test(d);
      if(it.unit==="sqm"||half){const mv=0.03;add("First Class Bricks","nos",q*60,"bricks",5);add("Cement (OPC 43)","bag",q*mv*mp.cement,"cement",3);add("Coarse Sand","cum",q*mv*mp.sand,"sand",10);}
      else{const mv=0.23;add("First Class Bricks","nos",q*500,"bricks",5);add("Cement (OPC 43)","bag",q*mv*mp.cement,"cement",3);add("Coarse Sand","cum",q*mv*mp.sand,"sand",10);}break;}
    case "formwork":{ // amortized over ~8-10 reuses
      add("Shuttering Plywood 12mm","sqm",q*0.12,"shutterply",10);
      add("Wooden Battens/Props","cft",q*0.30,"timber",8);
      add("Shuttering Oil","ltr",q*0.05,"formoil",5);
      add("Nails & Binding","kg",q*0.10,"nails",5);break;}
    case "plastering":{const t=parseThickness(d,12),r=parseRatio(d,6),mp=mortarPerCum(r),v=t/1000;
      add("Cement (OPC 43)","bag",q*v*mp.cement,"cement",5);
      add("Fine Sand","cum",q*v*mp.sand,"fineSand",10);
      if(/neeru|punning|white cement/.test(d))add("White Cement","kg",q*0.4,"putty",5);break;}
    case "flooring":{const mp=mortarPerCum(4),bed=0.02;
      if(/marble/.test(d)){add("Marble Slab 20mm","sqm",q*1.03,"marble",3);}
      else if(/granite/.test(d)){add("Granite Slab 18mm","sqm",q*1.03,"granite",3);}
      else if(/kota/.test(d)){add("Kota Stone 25mm","sqm",q*1.04,"kota",4);}
      else if(/floor hardener|hardener/.test(d)){const mix=parseConcrete("1:2:4");add("Cement (OPC 43)","bag",q*0.04*mix.cement+q*0,"cement",5);add("Floor Hardener","kg",q*3.0,"hardener",5);}
      else if(/anti.?skid/.test(d)){add("Anti-skid Tiles 300x300","sqm",q*1.05,"antiskid",5);}
      else if(/ceramic|300\s*x\s*300|300x300/.test(d)){add("Ceramic Tiles 300x300","sqm",q*1.05,"tiles300",5);}
      else{add("Vitrified Tiles 600x600","sqm",q*1.05,"tiles600",5);}
      add("Cement (OPC 43)","bag",q*bed*mp.cement,"cement",5);
      add("Coarse Sand","cum",q*bed*mp.sand,"sand",10);break;}
    case "steel":
      if(/grill|railing/.test(d)){add("MS Grill/Railing Sections","kg",q*1.0,"msgrill",3);add("Welding & Consumables","kg",q*0.02,"bindwire",5);}
      else{add("HYSD Steel Fe-500D","kg",q*1.0,"steel",3);add("Binding Wire","kg",q*0.01,"bindwire",5);}break;
    case "painting":{
      if(/distemper/.test(d))add("Acrylic Distemper","ltr",q*0.18,"distemper",8);
      else if(/enamel/.test(d)){add("Synthetic Enamel Paint","ltr",q*0.13,"enamel",8);add("Wood/Metal Primer","ltr",q*0.10,"primer",5);break;}
      else if(/exterior|weatherproof|apex/.test(d)){add("Exterior Emulsion (Apex)","ltr",q*0.20,"extpaint",8);add("Exterior Primer","ltr",q*0.10,"primer",5);break;}
      else if(/putty/.test(d)){add("Wall Putty","kg",q*1.6,"putty",10);break;}
      else add("Acrylic Emulsion Paint","ltr",q*0.18,"paint",8);
      add("Cement Primer","ltr",q*0.10,"primer",5);
      add("Wall Putty","kg",q*0.45,"putty",10);break;}
    case "sanitary":{
      if(/wash basin|basin|wash hand/.test(d)){add("Wash Basin (vitreous china)","nos",q*1,"basin",0);add("CP Fittings & Waste","set",q*1,"cptap",0);}
      else if(/water closet|ewc|closet|w\.c/.test(d)){add("EWC with Cistern","nos",q*1,"wc",0);add("Seat Cover & Fittings","set",q*1,"cptap",0);}
      else if(/sink/.test(d)){add("SS Kitchen Sink","nos",q*1,"sink",0);add("Sink Waste Coupling","set",q*1,"cptap",0);}
      else if(/urinal/.test(d)){add("Urinal (vitreous china)","nos",q*1,"basin",0);}
      else if(/cock|tap/.test(d)){add("CP Brass Tap/Cock","nos",q*1,"cptap",0);}
      else{add("Sanitary Fixture","nos",q*1,"basin",0);}break;}
    case "falseceiling":{
      if(/mineral fibre|grid/.test(d)){add("Mineral Fibre Tiles 600x600","sqm",q*1.0,"mineralfibre",5);add("GI Grid Framework","sqm",q*1.0,"giframe",5);}
      else{add("Gypsum Board 12.5mm","sqm",q*1.05,"gypsum",5);add("GI Framework & Channels","sqm",q*1.0,"giframe",5);add("Jointing Compound & Screws","sqm",q*1.0,"nails",5);}break;}
    case "roadwork":{
      if(/dbm|dense bituminous/.test(d)){add("DBM Bituminous Mix","sqm",q*1.0,"dbm",3);add("Bitumen (VG-30)","kg",q*5.5,"bitumen",3);}
      else if(/bituminous concrete|\bbc\b|wearing/.test(d)){add("Bituminous Concrete Mix","sqm",q*1.0,"bc",3);add("Bitumen (VG-30)","kg",q*5.0,"bitumen",3);}
      else if(/gsb|granular sub/.test(d)){add("Granular Sub-base Material","cum",q*1.0,"gsb",5);}
      else{add("Aggregate (graded)","cum",q*1.0,"agg40",5);}break;}
    case "plumbing":{
      if(/110|drain|soil|waste/.test(d))add("PVC Pipe 110mm","rmt",q*1.0,"pvc110",5);
      else if(/75/.test(d))add("PVC Pipe 75mm","rmt",q*1.0,"pvc75",5);
      else if(/25\s*mm/.test(d))add("CPVC Pipe 25mm","rmt",q*1.0,"cpvc25",5);
      else add("CPVC Pipe 20mm","rmt",q*1.0,"cpvc20",5);
      add("Pipe Fittings","nos",q*0.4,"fittings",0);break;}
    case "electrical":
      if(/distribution board|mcb|db\b/.test(d)){add("MCB Distribution Board","nos",q*1,"mcbboard",0);break;}
      if(/cable|armoured/.test(d)){add("Armoured Cable 16sqmm","rmt",q*1.05,"cable16",3);break;}
      add("PVC Conduit 20mm","rmt",q*8,"conduit",5);
      add("Copper Wire 1.5sqmm","rmt",q*15,"wire",8);
      add("Switch/Socket & Box","nos",q*1,"switchset",0);break;
    case "earthwork":{

    case "woodwork":{
      if(/window/.test(d)){if(/upvc/.test(d))add("UPVC Window Assembly","sqm",q*1.0,"upvcwin",2);else add("Aluminium Window Assembly","sqm",q*1.0,"alum",2);}

  }
  return o;
}

const fmtINR=n=>new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n||0);
const fmtNum=n=>new Intl.NumberFormat("en-IN",{maximumFractionDigits:2}).format(n||0);
function detectCategory(desc,unit){
  const l=(desc||"").toLowerCase(),u=(unit||"").toLowerCase();
  // 1) Steel by weight (kg/MT) or structural sections / grill / railing
  if(/\b(hysd|tmt|rebar|grill|railing)\b/.test(l)||(/(reinforc|structural steel|steel bar|steel work|steel section)/.test(l)&&(u==="kg"||u==="mt"||u==="quintal")))return "steel";
  // 2) Sanitary fixtures (before plumbing & before generic 'steel' in sink)
  if(/wash basin|water closet|\bewc\b|urinal|cistern|kitchen sink|\bsink\b|wash hand|pillar cock|bib cock|sanitary ware/.test(l))return "sanitary";
  // 3) Joinery: windows/doors (before plumbing so 'uPVC' window isn't read as PVC pipe)
  if(/\bwindow\b|casement|glazing|flush door|panelled door|door shutter|shutter with frame/.test(l))return "woodwork";
  // 4) Electrical points/wiring ('point' unit & wiring/conductor override generic 'pvc')
  if(u==="point"||/\bwiring\b|conductor|light point|fan point|power point|distribution board|\bmcb\b/.test(l))return "electrical";
  for(const[c,ks]of Object.entries(CAT_KEYWORDS)){if(ks.some(k=>l.includes(k)))return c;}
  return "misc";
}
function similarity(a,b){const w1=a.split(/\s+/).filter(w=>w.length>2),w2=b.split(/\s+/).filter(w=>w.length>2);if(!w1.length||!w2.length)return 0;let m=0;for(const w of w1){if(w2.some(x=>x.includes(w)||w.includes(x)))m++;}return m/Math.max(w1.length,w2.length);}

/* ---------- BOQ PARSER ---------- */
function parseWorkbook(wb){
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
  const hi=findHeader(rows);
  const map=mapCols((rows[hi]||[]).map(h=>String(h||"").toLowerCase().trim()));
  const items=[];let total=0;
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];if(!r||r.every(c=>c===""||c==null))continue;
    const desc=String(r[map.description]||"").trim();if(desc.length<3)continue;
    const qty=parseFloat(String(r[map.quantity]||"0"))||0;
    const rate=parseFloat(String(r[map.rate]||"0"))||0;
    const amt=parseFloat(String(r[map.amount]||"0"))||qty*rate;
    if(qty===0&&rate===0&&amt===0)continue;
    const unit=normUnit(String(r[map.unit]||"").trim());
    items.push({slNo:parseInt(String(r[map.slNo]||""))||items.length+1,itemCode:String(r[map.itemCode]||"").trim(),description:desc,unit:unit||"nos",quantity:qty,rate:rate||null,amount:amt||null,category:detectCategory(desc,unit)});
    total+=amt;
  }
  return {items,metadata:{totalItems:items.length,totalAmount:total,categories:[...new Set(items.map(i=>i.category))]}};
}
function findHeader(rows){const kw=["sl","item","description","quantity","unit","rate","amount","particular"];for(let i=0;i<Math.min(12,rows.length);i++){const r=(rows[i]||[]).map(c=>String(c||"").toLowerCase());if(r.filter(c=>kw.some(k=>c.includes(k))).length>=2)return i;}return 0;}
function mapCols(h){const f=(ks)=>{for(const k of ks){const i=h.findIndex(x=>x.includes(k));if(i!==-1)return i;}return 0;};return{slNo:f(["sl","s.no","sr","sno","#"]),itemCode:f(["item code","code","item no","ref"]),description:f(["description","particular","item","work","detail","name of"]),unit:f(["unit","uom"]),quantity:f(["quantity","qty","quan"]),rate:f(["rate","unit rate","price"]),amount:f(["amount","total","value","cost"])};}
function normUnit(u){const l=u.toLowerCase().replace(/\./g,"").replace(/\s/g,"");const m={cubicmeter:"cum",cum:"cum",m3:"cum",cumt:"cum",squaremeter:"sqm",sqm:"sqm",m2:"sqm",sqmt:"sqm",runningmeter:"rmt",rm:"rmt",rmt:"rmt",meter:"rmt",mtr:"rmt",kilogram:"kg",kg:"kg",kgs:"kg",numbers:"nos",nos:"nos",no:"nos",each:"nos",ea:"nos",lumpsum:"ls",ls:"ls",litre:"ltr",ltr:"ltr",lt:"ltr",kl:"kl",mt:"mt",tonne:"mt",bag:"bag",bags:"bag",set:"set",point:"point",pt:"point",cft:"cft",sft:"sft",quintal:"quintal"};return m[l]||u||"nos";}

/* ---------- AI ANALYZER ---------- */
function analyze(items,source){
  const rates=source==="bihar"?BIHAR_RATES:CPWD_RATES;
  const mr=MAT_RATES[source];
  let matched=0;
  // Map each item to its best DSR match; recover category for unclassified items
  const mapped=items.map(it=>{
    const dsr=bestMatch(it,rates);
    let cat=it.category;
    if((!cat||cat==="misc")&&dsr)cat=dsr.category;
    if(dsr)matched++;
    return {...it,category:cat,dsr};
  });
  const all=[];
  for(const it of mapped){
    for(const c of getMaterials(it)){
      const base=c.qty,w=c.w||0,tot=base*(1+w/100),rate=mr[c.rk]||0;
      all.push({materialName:c.m,quantity:round2(base),unit:c.u,rate,wastagePercent:w,totalWithWastage:round2(tot),amount:round2(tot*rate),category:it.category,source});
    }
  }
  const mats=consolidate(all);
  const catBd=categoryBreakdown(mats);
  const matCost=mats.reduce((s,m)=>s+(m.amount||0),0);
  // Labor from DSR labor component when unit matches, else 25% of item value
  let laborCost=0;
  for(const it of mapped){
    if(it.dsr&&it.dsr.laborRate&&it.dsr.unit===it.unit)laborCost+=it.quantity*it.dsr.laborRate;
    else laborCost+=(it.amount||it.quantity*(it.rate||0))*0.25;
  }
  const equipCost=matCost*0.08;
  const overhead=(matCost+laborCost)*0.12;
  const estCost=matCost+laborCost+equipCost+overhead;
  const boqStated=items.reduce((s,i)=>s+(i.amount||0),0);
  const pricedItems=items.filter(i=>i.amount&&i.amount>0).length;
  const hasBoqPrices=pricedItems>=Math.max(1,Math.round(items.length*0.5)); // majority priced
  // Authoritative project value = BOQ's own priced total when available (100% as submitted),
  // otherwise fall back to the DSR-based estimate.
  const projectValue=hasBoqPrices?boqStated:Math.round(estCost);
  const coverage=items.length?matched/items.length:0;
  const confidence=Math.round((0.6+0.37*coverage)*100)/100;
  return {materials:mats,categoryBreakdown:catBd,totalCost:estCost,summary:{totalItems:items.length,totalMaterials:mats.length,estimatedCost:estCost,projectValue,hasBoqPrices,pricedItems,laborCost:Math.round(laborCost),materialCost:Math.round(matCost),equipmentCost:Math.round(equipCost),overheadCost:Math.round(overhead),boqStatedCost:Math.round(boqStated),confidence},source};
}
function bestMatch(it,rates){
  // 1) exact item-code match (highest confidence)
  if(it.itemCode){const code=String(it.itemCode).trim().toLowerCase();const ic=rates.find(r=>r.itemCode.toLowerCase()===code||r.itemCode.toLowerCase()==="b-"+code);if(ic)return ic;}
  // 2) best description similarity within same category when known
  let best=null,bs=0;const d=it.description.toLowerCase();
  for(const r of rates){if(it.category&&it.category!=="misc"&&r.category!==it.category)continue;const s=similarity(d,r.description.toLowerCase());if(s>bs&&s>0.28){bs=s;best=r;}}
  // 3) fallback: best similarity across all, then category default
  if(!best){for(const r of rates){const s=similarity(d,r.description.toLowerCase());if(s>bs&&s>0.3){bs=s;best=r;}}}
  if(!best&&it.category)best=rates.find(r=>r.category===it.category)||null;
  return best;
}
function consolidate(arr){const m=new Map();for(const x of arr){const k=x.materialName+"|"+x.unit;if(m.has(k)){const e=m.get(k);e.quantity+=x.quantity;e.totalWithWastage+=x.totalWithWastage;e.amount+=x.amount;}else m.set(k,{...x});}return [...m.values()].map(x=>({...x,quantity:Math.round(x.quantity*100)/100,totalWithWastage:Math.round(x.totalWithWastage*100)/100,amount:Math.round(x.amount*100)/100})).sort((a,b)=>b.amount-a.amount);}
function categoryBreakdown(mats){const m=new Map();for(const x of mats){if(!m.has(x.category))m.set(x.category,[]);m.get(x.category).push(x);}const total=mats.reduce((s,x)=>s+x.amount,0);return [...m.entries()].map(([category,a])=>{const c=a.reduce((s,x)=>s+x.amount,0);return{category,materialCount:a.length,totalCost:Math.round(c),percentage:total?Math.round(c/total*100):0};}).sort((a,b)=>b.totalCost-a.totalCost);}
function genDPR(analysis,duration=180){
  const s=analysis.summary;
  // Anchor budget to the authoritative project value (BOQ price when available)
  const t=s.projectValue||analysis.totalCost;
  const scale=analysis.totalCost?t/analysis.totalCost:1; // distribute splits to match project value
  const labor=Math.round(s.laborCost*scale),material=Math.round(s.materialCost*scale),equipment=Math.round(s.equipmentCost*scale),overhead=Math.round(t-labor-material-equipment);
  const daily=t/duration;const entries=[];
  for(let d=1;d<=Math.min(7,duration);d++){const prog=d/duration*100;const dc=daily*(0.8+Math.random()*0.4);entries.push({day:d,date:new Date(Date.now()+d*864e5).toISOString().split("T")[0],planned:Math.round(daily),actual:Math.round(dc),cumP:Math.round(daily*d),cumA:Math.round(dc*d),progress:Math.round(prog*10)/10,variance:Math.round((daily-dc))});}
  return {projectSummary:{totalBudget:Math.round(t),dailyBudget:Math.round(daily),duration,laborBudget:labor,materialBudget:material,equipmentBudget:equipment,overheadBudget:overhead,priceSource:s.hasBoqPrices?"BOQ":"DSR"},dprEntries:entries,costBreakdown:{labor:Math.round(labor/t*100),material:Math.round(material/t*100),equipment:Math.round(equipment/t*100),overhead:Math.round(overhead/t*100)}};
}

    <button class="btn btn-primary" id="analyzeBtn" style="width:100%;justify-content:center;margin-top:18px;padding:14px;font-size:16px" ${STATE.file?'':'disabled'} onclick="doAnalyze()">⚡ Analyze BOQ</button>
    <div style="text-align:center;margin-top:16px;display:flex;gap:18px;justify-content:center">
      <a href="javascript:downloadSample()" style="color:var(--primary);font-size:13px;font-weight:600;text-decoration:none">📗 Download Sample BOQ</a>
      <a href="javascript:loadSampleAndAnalyze()" style="color:var(--green);font-size:13px;font-weight:600;text-decoration:none">🚀 Try with Sample Data</a>
    </div>
    <div class="card" style="margin-top:24px">
      <h3>Expected BOQ Format</h3>
      <div style="overflow-x:auto"><table style="font-size:12px"><thead><tr><th>Sl</th><th>Code</th><th>Description</th><th>Unit</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead><tbody>
      <tr><td>1</td><td>4.1</td><td>PCC 1:4:8 in foundation</td><td>cum</td><td>25.5</td><td>5765</td><td>147008</td></tr>
      <tr><td>2</td><td>5.1</td><td>Brick work in CM 1:6</td><td>cum</td><td>42.0</td><td>7250</td><td>304500</td></tr>
      </tbody></table></div>
      <p style="font-size:12px;color:var(--muted-fg);margin-top:10px">The AI auto-detects column formats. Ensure your BOQ has at least Description, Unit & Quantity columns.</p>
    </div>
  </div>`;
}
function bindUpload(){
  const dz=document.getElementById("dropzone"),fi=document.getElementById("fileInput");
  if(!dz)return;
  fi.onchange=e=>{if(e.target.files[0])setFile(e.target.files[0]);};
  ["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add("drag");}));
  ["dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove("drag");}));
  dz.addEventListener("drop",e=>{if(e.dataTransfer.files[0])setFile(e.dataTransfer.files[0]);});
}
function setFile(f){
  const ext="."+f.name.split(".").pop().toLowerCase();
  if(![".xlsx",".xls",".csv"].includes(ext)){showErr("Invalid file type. Upload .xlsx, .xls or .csv");return;}
  if(f.size>10*1024*1024){showErr("File too large. Max 10MB");return;}
  STATE.file=f;if(!STATE.projectName)STATE.projectName=f.name.replace(/\.[^/.]+$/,"");render();
}
function showErr(msg){const e=document.getElementById("uploadErr");if(e)e.innerHTML=`<div class="note note-amber" style="background:#fef2f2;color:#991b1b;border-color:#fecaca">⚠️ ${msg}</div>`;}
function doAnalyze(){
  if(!STATE.file)return;
  const btn=document.getElementById("analyzeBtn");btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Analyzing BOQ with AI...';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:"array"});
      const parsed=parseWorkbook(wb);
      if(!parsed.items.length){showErr("No valid BOQ items found. Check the file format.");btn.disabled=false;btn.innerHTML="⚡ Analyze BOQ";return;}
      runAnalysis(parsed,STATE.projectName||STATE.file.name,STATE.source);
    }catch(err){showErr("Failed to parse file: "+err.message);btn.disabled=false;btn.innerHTML="⚡ Analyze BOQ";}
  };
  reader.readAsArrayBuffer(STATE.file);
}
function runAnalysis(parsed,name,source){
  const res=analyze(parsed.items,source);
  res.projectName=name;res.fileName=STATE.file?STATE.file.name:"sample-boq.xlsx";res.itemCount=parsed.items.length;res.metadata=parsed.metadata;res.boqItems=parsed.items;
  STATE.result=res;STATE.dpr=genDPR(res);
  nav("analysis");
}

function vAnalysis(){
  if(!STATE.result)return empty("📈","No Analysis Data","Upload a BOQ file first to see material analysis results","Upload BOQ","upload");
  const r=STATE.result,s=r.summary;
  return `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px"><div><h2>BOQ Analysis Results</h2><p class="sub" style="margin:4px 0 0">${r.projectName} · ${r.fileName} · ${r.itemCount} items · ${r.source.toUpperCase()} DSR</p></div><button class="btn btn-primary" onclick="exportAnalysis()">⬇️ Export Report</button></div>
  <div class="grid g4" style="margin:18px 0">
    ${statBox("💰",s.hasBoqPrices?"Project Value (BOQ)":"Estimated Cost (DSR)",fmtINR(s.hasBoqPrices?s.projectValue:s.estimatedCost),"#eff6ff","#1d4ed8")}
    ${statBox("📦","Total Materials",s.totalMaterials+" items","#f0fdf4","#15803d")}
    ${statBox("📊","AI Confidence",(s.confidence*100).toFixed(0)+"%","#faf5ff","#7c3aed")}
    ${statBox("📋","BOQ Items",s.totalItems+" items","#fff7ed","#c2410c")}
  </div>
  <div class="grid g2" style="margin-bottom:18px">
    <div class="card"><h3>💹 Cost Breakdown</h3>
      ${costBar("Material Cost",s.materialCost,s.estimatedCost,"#3b82f6")}
      ${costBar("Labor Cost",s.laborCost,s.estimatedCost,"#22c55e")}
      ${costBar("Equipment Cost",s.equipmentCost,s.estimatedCost,"#eab308")}
      ${costBar("Overhead & Profit",s.overheadCost,s.estimatedCost,"#a855f7")}
      <div style="display:flex;justify-content:space-between;font-weight:700;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)"><span>DSR Estimated Total</span><span>${fmtINR(s.estimatedCost)}</span></div>
      ${s.boqStatedCost?`<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted-fg);margin-top:8px"><span>BOQ Stated Value</span><span>${fmtINR(s.boqStatedCost)}</span></div><div style="display:flex;justify-content:space-between;font-size:13px;margin-top:4px"><span>Variance vs BOQ</span><span style="color:${s.estimatedCost<=s.boqStatedCost?'#16a34a':'#dc2626'}">${((s.estimatedCost-s.boqStatedCost)/s.boqStatedCost*100).toFixed(1)}% ${s.estimatedCost<=s.boqStatedCost?'under':'over'}</span></div>`:""}
    </div>
    <div class="card"><h3>📊 Category-wise Breakdown</h3><div style="max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:8px">
    ${r.categoryBreakdown.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:9px;background:var(--muted)"><div style="display:flex;align-items:center;gap:10px"><span class="dot" style="background:${CAT_COLORS[c.category]||'#94a3b8'}"></span><div><div style="font-size:13px;font-weight:600;text-transform:capitalize">${c.category}</div><div style="font-size:11px;color:var(--muted-fg)">${c.materialCount} materials</div></div></div><div style="text-align:right"><div style="font-size:13px;font-weight:600">${fmtINR(c.totalCost)}</div><div style="font-size:11px;color:var(--muted-fg)">${c.percentage}%</div></div></div>`).join("")}
    </div></div>
  </div>
  <div class="card"><h3>📦 Material Quantity Breakdown</h3><div style="overflow-x:auto"><table>
    <thead><tr><th>#</th><th>Material</th><th>Category</th><th class="tr">Quantity</th><th>Unit</th><th class="tr">Rate</th><th class="tr">Wastage</th><th class="tr">Total Qty</th><th class="tr">Amount</th></tr></thead>
    <tbody>${r.materials.map((m,i)=>`<tr><td style="color:var(--muted-fg)">${i+1}</td><td style="font-weight:600">${m.materialName}</td><td><span class="pill" style="background:${CAT_COLORS[m.category]}22;color:${CAT_COLORS[m.category]}">${m.category}</span></td><td class="tr">${fmtNum(m.quantity)}</td><td style="color:var(--muted-fg)">${m.unit}</td><td class="tr">${fmtINR(m.rate)}</td><td class="tr" style="color:var(--orange)">${m.wastagePercent}%</td><td class="tr" style="font-weight:600">${fmtNum(m.totalWithWastage)}</td><td class="tr" style="font-weight:700">${fmtINR(m.amount)}</td></tr>`).join("")}</tbody>
  </table></div></div>
  <div class="note note-blue">ℹ️ <strong>Accuracy model:</strong> ${s.hasBoqPrices?`Project price is taken <strong>directly from your uploaded BOQ</strong> (${s.pricedItems}/${s.totalItems} items priced) — exact to the document. ${r.source==="bihar"?"Bihar":"CPWD"} DSR 2024 is shown as an independent benchmark.`:`No rates found in the BOQ, so price is <strong>estimated from ${r.source==="bihar"?"Bihar":"CPWD"} DSR 2024</strong>.`} Material quantities use IS-code coefficients with grade/thickness/mix parsing and standard wastage. Match confidence: ${(s.confidence*100).toFixed(0)}%.</div>`;
}
const statBox=(ic,lbl,val,bg,fg)=>`<div class="stat" style="background:${bg};color:${fg};border-color:${fg}33"><div style="font-size:20px">${ic}</div><div style="font-size:12px;opacity:.85;margin-top:6px">${lbl}</div><div style="font-size:19px;font-weight:800;margin-top:2px">${val}</div></div>`;
function costBar(lbl,amt,total,col){const p=total?(amt/total*100):0;return `<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span>${lbl}</span><span style="font-weight:600">${fmtINR(amt)} (${p.toFixed(0)}%)</span></div><div class="bar"><div style="width:${p}%;background:${col}"></div></div></div>`;}

function vDPR(){
  if(!STATE.dpr)return empty("📋","No Financial DPR Data","Upload a BOQ file first to generate Financial DPR","Upload BOQ","upload");
  const d=STATE.dpr,ps=d.projectSummary,cb=d.costBreakdown;
  const pie=conicPie(cb);
  return `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px"><div><h2>Financial Daily Progress Report</h2><p class="sub" style="margin:4px 0 0">Project cost tracking & daily expense analysis based on DSR rates</p></div><button class="btn btn-green" onclick="exportDPR()">⬇️ Export DPR</button></div>
  <div class="grid g4" style="margin:18px 0">
    ${statBox("💰","Total Project Budget",fmtINR(ps.totalBudget),"#eff6ff","#1d4ed8")}
    ${statBox("📅","Project Duration",ps.duration+" Days","#f0fdf4","#15803d")}
    ${statBox("👷","Labor Budget",fmtINR(ps.laborBudget),"#faf5ff","#7c3aed")}
    ${statBox("📦","Material Budget",fmtINR(ps.materialBudget),"#fff7ed","#c2410c")}
  </div>
  <div class="grid g2" style="margin-bottom:18px">
    <div class="card"><h3>Budget Allocation</h3>
      ${costBar("Labor",ps.laborBudget,ps.totalBudget,"#22c55e")}
      ${costBar("Materials",ps.materialBudget,ps.totalBudget,"#3b82f6")}
      ${costBar("Equipment",ps.equipmentBudget,ps.totalBudget,"#eab308")}
      ${costBar("Overhead & Profit",ps.overheadBudget,ps.totalBudget,"#a855f7")}
    </div>
    <div class="card"><h3>Cost Distribution</h3>
      <div style="display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap">
        <div style="width:170px;height:170px;border-radius:50%;background:${pie};position:relative;display:flex;align-items:center;justify-content:center"><div style="width:100px;height:100px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;flex-direction:column"><div style="font-size:13px;font-weight:800">${fmtINR(ps.totalBudget)}</div><div style="font-size:11px;color:var(--muted-fg)">Total</div></div></div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="legend"><span class="dot" style="background:#3b82f6"></span>Materials: <b>${cb.material}%</b></div>
          <div class="legend"><span class="dot" style="background:#22c55e"></span>Labor: <b>${cb.labor}%</b></div>
          <div class="legend"><span class="dot" style="background:#eab308"></span>Equipment: <b>${cb.equipment}%</b></div>
          <div class="legend"><span class="dot" style="background:#a855f7"></span>Overhead: <b>${cb.overhead}%</b></div>
        </div>
      </div>
    </div>
  </div>
  <div class="card"><h3>📅 Daily Progress Report (Sample Week)</h3><div style="overflow-x:auto"><table>
    <thead><tr><th>Day</th><th>Date</th><th class="tr">Planned</th><th class="tr">Actual</th><th class="tr">Cum. (P)</th><th class="tr">Cum. (A)</th><th class="tr">Variance</th><th class="tr">Progress</th></tr></thead>
    <tbody>${d.dprEntries.map(e=>`<tr><td style="font-weight:600">Day ${e.day}</td><td style="color:var(--muted-fg)">${e.date}</td><td class="tr">${fmtINR(e.planned)}</td><td class="tr" style="font-weight:600">${fmtINR(e.actual)}</td><td class="tr">${fmtINR(e.cumP)}</td><td class="tr">${fmtINR(e.cumA)}</td><td class="tr" style="color:${e.variance>=0?'#16a34a':'#dc2626'}">${e.variance>=0?'▲':'▼'} ${fmtINR(Math.abs(e.variance))}</td><td class="tr"><span class="pill" style="background:#dbeafe;color:#1d4ed8">${e.progress}%</span></td></tr>`).join("")}</tbody>
  </table></div></div>
  <div class="note note-amber">📌 <strong>Note:</strong> This is a projected DPR based on BOQ analysis. Actual daily costs vary with work progress, weather & resource availability. Update daily for accurate tracking.</div>`;
}
function conicPie(cb){let acc=0;const segs=[["#3b82f6",cb.material],["#22c55e",cb.labor],["#eab308",cb.equipment],["#a855f7",cb.overhead]];const parts=segs.map(([c,p])=>{const s=`${c} ${acc}% ${acc+p}%`;acc+=p;return s;});return `conic-gradient(${parts.join(",")})`;}

function vDSR(){
  return `<h2>📚 DSR Rate Book</h2><p class="sub">Browse CPWD & Bihar DSR 2024 schedule of rates used for cost estimation</p>
  <div class="card" style="margin-bottom:18px"><div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center">
    <div style="display:flex;border:1px solid var(--border);border-radius:9px;overflow:hidden">
      <button class="btn" style="border-radius:0;background:${STATE.dsrSource==='cpwd'?'#2563eb':'var(--muted)'};color:${STATE.dsrSource==='cpwd'?'#fff':'var(--fg)'}" onclick="STATE.dsrSource='cpwd';render()">CPWD 2024</button>
      <button class="btn" style="border-radius:0;background:${STATE.dsrSource==='bihar'?'#16a34a':'var(--muted)'};color:${STATE.dsrSource==='bihar'?'#fff':'var(--fg)'}" onclick="STATE.dsrSource='bihar';render()">Bihar 2024</button>
    </div>
    <select style="width:auto" onchange="STATE.dsrCat=this.value;renderDsrTable()" id="dsrCat"><option value="">All Categories</option>${[...new Set((STATE.dsrSource==='bihar'?BIHAR_RATES:CPWD_RATES).map(r=>r.category))].map(c=>`<option value="${c}" ${STATE.dsrCat===c?'selected':''}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join("")}</select>
    <input style="flex:1;min-width:200px" placeholder="🔍 Search DSR items..." value="${STATE.dsrSearch}" oninput="STATE.dsrSearch=this.value;renderDsrTable()"/>
  </div></div>
  <div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto" id="dsrTableWrap"></div></div>
  <div class="grid g3" style="margin-top:16px">
    <div class="note note-blue" style="margin:0">👷 <strong>Labor:</strong> Skilled & unskilled rates per minimum wages</div>
    <div class="note note-blue" style="margin:0;background:#f0fdf4;color:#15803d;border-color:#bbf7d0">📦 <strong>Material:</strong> Market rates incl. transportation</div>
    <div class="note note-amber" style="margin:0">🚜 <strong>Equipment:</strong> Machinery hire incl. fuel & operator</div>
  </div>`;
}
function renderDsrTable(){
  const wrap=document.getElementById("dsrTableWrap");if(!wrap)return;
  let rates=(STATE.dsrSource==="bihar"?BIHAR_RATES:CPWD_RATES);
  if(STATE.dsrCat)rates=rates.filter(r=>r.category===STATE.dsrCat);
  if(STATE.dsrSearch){const s=STATE.dsrSearch.toLowerCase();rates=rates.filter(r=>r.description.toLowerCase().includes(s)||r.itemCode.toLowerCase().includes(s)||r.category.includes(s));}
  wrap.innerHTML=`<table><thead><tr><th>Code</th><th>Description</th><th>Chapter</th><th>Category</th><th>Unit</th><th class="tr">Rate</th><th class="tr">Labor</th><th class="tr">Material</th><th class="tr">Equip.</th></tr></thead><tbody>
  ${rates.map(r=>`<tr><td style="font-family:monospace;font-size:12px;color:#2563eb;font-weight:600">${r.itemCode}</td><td style="max-width:280px">${r.description}</td><td style="color:var(--muted-fg)">${r.chapter}</td><td><span class="pill" style="background:${CAT_COLORS[r.category]}22;color:${CAT_COLORS[r.category]}">${r.category}</span></td><td style="color:var(--muted-fg)">${r.unit}</td><td class="tr" style="font-weight:700">${fmtINR(r.rate)}</td><td class="tr" style="color:#16a34a">${r.laborRate?fmtINR(r.laborRate):'-'}</td><td class="tr" style="color:#2563eb">${r.materialRate?fmtINR(r.materialRate):'-'}</td><td class="tr" style="color:#ca8a04">${r.equipmentRate?fmtINR(r.equipmentRate):'-'}</td></tr>`).join("")}
  </tbody></table>${rates.length?'':'<div style="padding:40px;text-align:center;color:var(--muted-fg)">No rates found matching your criteria</div>'}`;
}

const empty=(ic,t,d,btn,panel)=>`<div style="text-align:center;padding:80px 20px"><div style="font-size:50px;opacity:.4">${ic}</div><h2 style="margin-top:16px">${t}</h2><p class="sub" style="margin-top:6px">${d}</p><button class="btn btn-primary" onclick="nav('${panel}')">${btn}</button></div>`;

/* ---------- EXPORTS ---------- */
function exportAnalysis(){
  const r=STATE.result;if(!r)return;
  const wb=XLSX.utils.book_new();
  const sum=[["Infinity Bid — BOQ Analysis Report"],["Project",r.projectName],["DSR Source",r.source.toUpperCase()+" 2024"],["BOQ Items",r.itemCount],[],["Cost Summary",""],["Material Cost",r.summary.materialCost],["Labor Cost",r.summary.laborCost],["Equipment Cost",r.summary.equipmentCost],["Overhead & Profit",r.summary.overheadCost],["Total Estimated Cost",Math.round(r.summary.estimatedCost)]];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sum),"Summary");
  const mh=[["Material","Category","Quantity","Unit","Rate","Wastage %","Total Qty","Amount"]];
  r.materials.forEach(m=>mh.push([m.materialName,m.category,m.quantity,m.unit,m.rate,m.wastagePercent,m.totalWithWastage,m.amount]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(mh),"Materials");
  XLSX.writeFile(wb,"infinity-bid-analysis.xlsx");
}
function exportDPR(){
  const d=STATE.dpr;if(!d)return;
  const wb=XLSX.utils.book_new();
  const rows=[["Infinity Bid — Financial DPR"],["Total Budget",d.projectSummary.totalBudget],["Daily Budget",d.projectSummary.dailyBudget],["Duration (days)",d.projectSummary.duration],[],["Day","Date","Planned","Actual","Cumulative Planned","Cumulative Actual","Progress %","Variance"]];
  d.dprEntries.forEach(e=>rows.push([e.day,e.date,e.planned,e.actual,e.cumP,e.cumA,e.progress,e.variance]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),"Financial DPR");
  XLSX.writeFile(wb,"infinity-bid-dpr.xlsx");
}

/* ---------- INIT ---------- */
render();
</script>
</body>
