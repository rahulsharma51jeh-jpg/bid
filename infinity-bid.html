<style>

  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
  .g3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
  .g4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}

  h2{font-size:22px;font-weight:800}
  h3{font-size:16px;font-weight:700;margin-bottom:14px}
  .sub{color:var(--muted-fg);margin-bottom:20px}
  .stat{padding:16px;border-radius:12px;border:1px solid var(--border)}
  .stat .lbl{font-size:12px;opacity:.8}.stat .val{font-size:22px;font-weight:800;margin-top:4px}
  .btn{padding:10px 18px;border-radius:10px;border:none;font-weight:600;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:.15s}

  .btn-green{background:var(--green);color:#fff}.btn-ghost{background:var(--muted);color:var(--fg)}
  input,select{padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--fg);font-size:14px;width:100%}

  table{width:100%;border-collapse:collapse;font-size:13px}
  thead tr{background:var(--muted);text-align:left}
  th,td{padding:10px 12px}
  tbody tr{border-top:1px solid var(--border)}tbody tr:hover{background:var(--muted)}
  .tr{text-align:right}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;text-transform:capitalize}
  .dropzone{border:2px dashed var(--border);border-radius:14px;padding:48px 20px;text-align:center;cursor:pointer;transition:.2s;position:relative}
  .dropzone:hover,.dropzone.drag{border-color:var(--primary);background:#eff6ff}
  @media (prefers-color-scheme: dark){.dropzone:hover,.dropzone.drag{background:#1e3a5f}}
  .dropzone.has{border-color:var(--green);background:#f0fdf4}
  @media (prefers-color-scheme: dark){.dropzone.has{background:#052e16}}
  .bar{height:10px;background:var(--muted);border-radius:999px;overflow:hidden}

  .src-card{padding:16px;border:2px solid var(--border);border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:.15s}

  .fade{animation:fade .3s ease}

  .spinner{width:18px;height:18px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .note{padding:14px;border-radius:10px;font-size:13px;margin-top:16px}
  .note-blue{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
  .note-amber{background:#fffbeb;color:#92400e;border:1px solid #fde68a}

  .qa h4{font-size:18px;font-weight:700;margin:10px 0 4px}.qa p{font-size:13px;opacity:.9}
  .legend{display:flex;align-items:center;gap:6px;font-size:12px}.dot{width:11px;height:11px;border-radius:50%}

const fmtNum=n=>new Intl.NumberFormat("en-IN",{maximumFractionDigits:2}).format(n||0);
function detectCategory(desc){const l=(desc||"").toLowerCase();for(const[c,ks]of Object.entries(CAT_KEYWORDS)){if(ks.some(k=>l.includes(k)))return c;}return "misc";}
function similarity(a,b){const w1=a.split(/\s+/).filter(w=>w.length>2),w2=b.split(/\s+/).filter(w=>w.length>2);if(!w1.length||!w2.length)return 0;let m=0;for(const w of w1){if(w2.some(x=>x.includes(w)||w.includes(x)))m++;}return m/Math.max(w1.length,w2.length);}

/* ---------- BOQ PARSER ---------- */
function parseWorkbook(wb){
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
  const hi=findHeader(rows);
  const map=mapCols((rows[hi]||[]).map(h=>String(h||"").toLowerCase().trim()));
  const items=[];let total=0;
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];if(!r||r.every(c=>c===""||c==null))continue;
    const desc=String(r[map.description]||"").trim();if(desc.length<3)continue;
    const qty=parseFloat(String(r[map.quantity]||"0"))||0;
    const rate=parseFloat(String(r[map.rate]||"0"))||0;
    const amt=parseFloat(String(r[map.amount]||"0"))||qty*rate;
    if(qty===0&&rate===0&&amt===0)continue;
    const unit=normUnit(String(r[map.unit]||"").trim());
    items.push({slNo:parseInt(String(r[map.slNo]||""))||items.length+1,itemCode:String(r[map.itemCode]||"").trim(),description:desc,unit:unit||"nos",quantity:qty,rate:rate||null,amount:amt||null,category:detectCategory(desc)});
    total+=amt;
  }
  return {items,metadata:{totalItems:items.length,totalAmount:total,categories:[...new Set(items.map(i=>i.category))]}};
}
function findHeader(rows){const kw=["sl","item","description","quantity","unit","rate","amount","particular"];for(let i=0;i<Math.min(12,rows.length);i++){const r=(rows[i]||[]).map(c=>String(c||"").toLowerCase());if(r.filter(c=>kw.some(k=>c.includes(k))).length>=2)return i;}return 0;}
function mapCols(h){const f=(ks)=>{for(const k of ks){const i=h.findIndex(x=>x.includes(k));if(i!==-1)return i;}return 0;};return{slNo:f(["sl","s.no","sr","sno","#"]),itemCode:f(["item code","code","item no","ref"]),description:f(["description","particular","item","work","detail","name of"]),unit:f(["unit","uom"]),quantity:f(["quantity","qty","quan"]),rate:f(["rate","unit rate","price"]),amount:f(["amount","total","value","cost"])};}
function normUnit(u){const l=u.toLowerCase().replace(/\./g,"").replace(/\s/g,"");const m={cubicmeter:"cum",cum:"cum",m3:"cum",cumt:"cum",squaremeter:"sqm",sqm:"sqm",m2:"sqm",sqmt:"sqm",runningmeter:"rmt",rm:"rmt",rmt:"rmt",meter:"rmt",mtr:"rmt",kilogram:"kg",kg:"kg",kgs:"kg",numbers:"nos",nos:"nos",no:"nos",each:"nos",ea:"nos",lumpsum:"ls",ls:"ls",litre:"ltr",ltr:"ltr",lt:"ltr",kl:"kl",mt:"mt",tonne:"mt",bag:"bag",bags:"bag",set:"set",point:"point",pt:"point",cft:"cft",sft:"sft",quintal:"quintal"};return m[l]||u||"nos";}

/* ---------- AI ANALYZER ---------- */
function analyze(items,source){
  const rates=source==="bihar"?BIHAR_RATES:CPWD_RATES;
  const mr=MAT_RATES[source];
  const mapped=items.map(it=>({...it,dsr:bestMatch(it,rates)}));
  const all=[];
  for(const it of mapped){
    const comps=COMPOSITIONS[it.category]||[];
    for(const c of comps){
      const base=it.quantity*c.per;const wq=base*(c.w/100);const tot=base+wq;const rate=mr[c.rk]||50;
      all.push({materialName:c.m,quantity:Math.round(base*100)/100,unit:c.u,rate,wastagePercent:c.w,totalWithWastage:Math.round(tot*100)/100,amount:Math.round(tot*rate*100)/100,category:it.category,source});
    }
  }
  const mats=consolidate(all);
  const catBd=categoryBreakdown(mats);
  const matCost=mats.reduce((s,m)=>s+(m.amount||0),0);
  let laborCost=0;for(const it of mapped){if(it.dsr&&it.dsr.laborRate)laborCost+=it.quantity*it.dsr.laborRate;else laborCost+=(it.amount||it.quantity*(it.rate||0))*0.25;}
  const equipCost=matCost*0.08;const overhead=(matCost+laborCost)*0.12;
  const estCost=matCost+laborCost+equipCost+overhead;
  return {materials:mats,categoryBreakdown:catBd,totalCost:estCost,summary:{totalItems:items.length,totalMaterials:mats.length,estimatedCost:estCost,laborCost:Math.round(laborCost),materialCost:Math.round(matCost),equipmentCost:Math.round(equipCost),overheadCost:Math.round(overhead),confidence:0.85},source};
}
function bestMatch(it,rates){let best=null,bs=0;const d=it.description.toLowerCase();for(const r of rates){const s=similarity(d,r.description.toLowerCase());if(s>bs&&s>0.3){bs=s;best=r;}}if(!best&&it.category)best=rates.find(r=>r.category===it.category)||null;return best;}
function consolidate(arr){const m=new Map();for(const x of arr){const k=x.materialName+"|"+x.unit;if(m.has(k)){const e=m.get(k);e.quantity+=x.quantity;e.totalWithWastage+=x.totalWithWastage;e.amount+=x.amount;}else m.set(k,{...x});}return [...m.values()].map(x=>({...x,quantity:Math.round(x.quantity*100)/100,totalWithWastage:Math.round(x.totalWithWastage*100)/100,amount:Math.round(x.amount*100)/100})).sort((a,b)=>b.amount-a.amount);}
function categoryBreakdown(mats){const m=new Map();for(const x of mats){if(!m.has(x.category))m.set(x.category,[]);m.get(x.category).push(x);}const total=mats.reduce((s,x)=>s+x.amount,0);return [...m.entries()].map(([category,a])=>{const c=a.reduce((s,x)=>s+x.amount,0);return{category,materialCount:a.length,totalCost:Math.round(c),percentage:total?Math.round(c/total*100):0};}).sort((a,b)=>b.totalCost-a.totalCost);}
function genDPR(analysis,duration=180){
  const daily=analysis.totalCost/duration;const entries=[];
  for(let d=1;d<=Math.min(7,duration);d++){const prog=d/duration*100;const dc=daily*(0.8+Math.random()*0.4);entries.push({day:d,date:new Date(Date.now()+d*864e5).toISOString().split("T")[0],planned:Math.round(daily),actual:Math.round(dc),cumP:Math.round(daily*d),cumA:Math.round(dc*d),progress:Math.round(prog*10)/10,variance:Math.round((daily-dc))});}
  const s=analysis.summary,t=analysis.totalCost;
  return {projectSummary:{totalBudget:Math.round(t),dailyBudget:Math.round(daily),duration,laborBudget:s.laborCost,materialBudget:s.materialCost,equipmentBudget:s.equipmentCost,overheadBudget:s.overheadCost},dprEntries:entries,costBreakdown:{labor:Math.round(s.laborCost/t*100),material:Math.round(s.materialCost/t*100),equipment:Math.round(s.equipmentCost/t*100),overhead:Math.round(s.overheadCost/t*100)}};
}

function bindUpload(){
  const dz=document.getElementById("dropzone"),fi=document.getElementById("fileInput");
  if(!dz)return;
  fi.onchange=e=>{if(e.target.files[0])setFile(e.target.files[0]);};
  ["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add("drag");}));
  ["dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove("drag");}));
  dz.addEventListener("drop",e=>{if(e.dataTransfer.files[0])setFile(e.dataTransfer.files[0]);});
}
function setFile(f){
  const ext="."+f.name.split(".").pop().toLowerCase();
  if(![".xlsx",".xls",".csv"].includes(ext)){showErr("Invalid file type. Upload .xlsx, .xls or .csv");return;}
  if(f.size>10*1024*1024){showErr("File too large. Max 10MB");return;}
  STATE.file=f;if(!STATE.projectName)STATE.projectName=f.name.replace(/\.[^/.]+$/,"");render();
}
function showErr(msg){const e=document.getElementById("uploadErr");if(e)e.innerHTML=`<div class="note note-amber" style="background:#fef2f2;color:#991b1b;border-color:#fecaca">⚠️ ${msg}</div>`;}
function doAnalyze(){
  if(!STATE.file)return;
  const btn=document.getElementById("analyzeBtn");btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Analyzing BOQ with AI...';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:"array"});
      const parsed=parseWorkbook(wb);
      if(!parsed.items.length){showErr("No valid BOQ items found. Check the file format.");btn.disabled=false;btn.innerHTML="⚡ Analyze BOQ";return;}
      runAnalysis(parsed,STATE.projectName||STATE.file.name,STATE.source);
    }catch(err){showErr("Failed to parse file: "+err.message);btn.disabled=false;btn.innerHTML="⚡ Analyze BOQ";}
  };
  reader.readAsArrayBuffer(STATE.file);
}
function runAnalysis(parsed,name,source){
  const res=analyze(parsed.items,source);
  res.projectName=name;res.fileName=STATE.file?STATE.file.name:"sample-boq.xlsx";res.itemCount=parsed.items.length;res.metadata=parsed.metadata;res.boqItems=parsed.items;
  STATE.result=res;STATE.dpr=genDPR(res);
  nav("analysis");
}

    </div>
    <div class="card"><h3>📊 Category-wise Breakdown</h3><div style="max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:8px">
    ${r.categoryBreakdown.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:9px;background:var(--muted)"><div style="display:flex;align-items:center;gap:10px"><span class="dot" style="background:${CAT_COLORS[c.category]||'#94a3b8'}"></span><div><div style="font-size:13px;font-weight:600;text-transform:capitalize">${c.category}</div><div style="font-size:11px;color:var(--muted-fg)">${c.materialCount} materials</div></div></div><div style="text-align:right"><div style="font-size:13px;font-weight:600">${fmtINR(c.totalCost)}</div><div style="font-size:11px;color:var(--muted-fg)">${c.percentage}%</div></div></div>`).join("")}
    </div></div>
  </div>
  <div class="card"><h3>📦 Material Quantity Breakdown</h3><div style="overflow-x:auto"><table>
    <thead><tr><th>#</th><th>Material</th><th>Category</th><th class="tr">Quantity</th><th>Unit</th><th class="tr">Rate</th><th class="tr">Wastage</th><th class="tr">Total Qty</th><th class="tr">Amount</th></tr></thead>
    <tbody>${r.materials.map((m,i)=>`<tr><td style="color:var(--muted-fg)">${i+1}</td><td style="font-weight:600">${m.materialName}</td><td><span class="pill" style="background:${CAT_COLORS[m.category]}22;color:${CAT_COLORS[m.category]}">${m.category}</span></td><td class="tr">${fmtNum(m.quantity)}</td><td style="color:var(--muted-fg)">${m.unit}</td><td class="tr">${fmtINR(m.rate)}</td><td class="tr" style="color:var(--orange)">${m.wastagePercent}%</td><td class="tr" style="font-weight:600">${fmtNum(m.totalWithWastage)}</td><td class="tr" style="font-weight:700">${fmtINR(m.amount)}</td></tr>`).join("")}</tbody>
  </table></div></div>
  <div class="note note-blue">ℹ️ <strong>AI Analysis Notes:</strong> Rates based on ${r.source==="bihar"?"Bihar":"CPWD"} DSR 2024. Wastage percentages per IS standards. Actual costs may vary with local market conditions. Confidence: ${(s.confidence*100).toFixed(0)}%</div>`;
}
const statBox=(ic,lbl,val,bg,fg)=>`<div class="stat" style="background:${bg};color:${fg};border-color:${fg}33"><div style="font-size:20px">${ic}</div><div style="font-size:12px;opacity:.85;margin-top:6px">${lbl}</div><div style="font-size:19px;font-weight:800;margin-top:2px">${val}</div></div>`;
function costBar(lbl,amt,total,col){const p=total?(amt/total*100):0;return `<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span>${lbl}</span><span style="font-weight:600">${fmtINR(amt)} (${p.toFixed(0)}%)</span></div><div class="bar"><div style="width:${p}%;background:${col}"></div></div></div>`;}

function vDPR(){
  if(!STATE.dpr)return empty("📋","No Financial DPR Data","Upload a BOQ file first to generate Financial DPR","Upload BOQ","upload");
  const d=STATE.dpr,ps=d.projectSummary,cb=d.costBreakdown;
  const pie=conicPie(cb);
  return `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px"><div><h2>Financial Daily Progress Report</h2><p class="sub" style="margin:4px 0 0">Project cost tracking & daily expense analysis based on DSR rates</p></div><button class="btn btn-green" onclick="exportDPR()">⬇️ Export DPR</button></div>
  <div class="grid g4" style="margin:18px 0">
    ${statBox("💰","Total Project Budget",fmtINR(ps.totalBudget),"#eff6ff","#1d4ed8")}
    ${statBox("📅","Project Duration",ps.duration+" Days","#f0fdf4","#15803d")}
    ${statBox("👷","Labor Budget",fmtINR(ps.laborBudget),"#faf5ff","#7c3aed")}
    ${statBox("📦","Material Budget",fmtINR(ps.materialBudget),"#fff7ed","#c2410c")}
  </div>
  <div class="grid g2" style="margin-bottom:18px">
    <div class="card"><h3>Budget Allocation</h3>
      ${costBar("Labor",ps.laborBudget,ps.totalBudget,"#22c55e")}
      ${costBar("Materials",ps.materialBudget,ps.totalBudget,"#3b82f6")}
      ${costBar("Equipment",ps.equipmentBudget,ps.totalBudget,"#eab308")}
      ${costBar("Overhead & Profit",ps.overheadBudget,ps.totalBudget,"#a855f7")}
    </div>
    <div class="card"><h3>Cost Distribution</h3>
      <div style="display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap">
        <div style="width:170px;height:170px;border-radius:50%;background:${pie};position:relative;display:flex;align-items:center;justify-content:center"><div style="width:100px;height:100px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;flex-direction:column"><div style="font-size:13px;font-weight:800">${fmtINR(ps.totalBudget)}</div><div style="font-size:11px;color:var(--muted-fg)">Total</div></div></div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="legend"><span class="dot" style="background:#3b82f6"></span>Materials: <b>${cb.material}%</b></div>
          <div class="legend"><span class="dot" style="background:#22c55e"></span>Labor: <b>${cb.labor}%</b></div>
          <div class="legend"><span class="dot" style="background:#eab308"></span>Equipment: <b>${cb.equipment}%</b></div>
          <div class="legend"><span class="dot" style="background:#a855f7"></span>Overhead: <b>${cb.overhead}%</b></div>
        </div>
      </div>
    </div>
  </div>
  <div class="card"><h3>📅 Daily Progress Report (Sample Week)</h3><div style="overflow-x:auto"><table>
    <thead><tr><th>Day</th><th>Date</th><th class="tr">Planned</th><th class="tr">Actual</th><th class="tr">Cum. (P)</th><th class="tr">Cum. (A)</th><th class="tr">Variance</th><th class="tr">Progress</th></tr></thead>
    <tbody>${d.dprEntries.map(e=>`<tr><td style="font-weight:600">Day ${e.day}</td><td style="color:var(--muted-fg)">${e.date}</td><td class="tr">${fmtINR(e.planned)}</td><td class="tr" style="font-weight:600">${fmtINR(e.actual)}</td><td class="tr">${fmtINR(e.cumP)}</td><td class="tr">${fmtINR(e.cumA)}</td><td class="tr" style="color:${e.variance>=0?'#16a34a':'#dc2626'}">${e.variance>=0?'▲':'▼'} ${fmtINR(Math.abs(e.variance))}</td><td class="tr"><span class="pill" style="background:#dbeafe;color:#1d4ed8">${e.progress}%</span></td></tr>`).join("")}</tbody>
  </table></div></div>
  <div class="note note-amber">📌 <strong>Note:</strong> This is a projected DPR based on BOQ analysis. Actual daily costs vary with work progress, weather & resource availability. Update daily for accurate tracking.</div>`;
}
function conicPie(cb){let acc=0;const segs=[["#3b82f6",cb.material],["#22c55e",cb.labor],["#eab308",cb.equipment],["#a855f7",cb.overhead]];const parts=segs.map(([c,p])=>{const s=`${c} ${acc}% ${acc+p}%`;acc+=p;return s;});return `conic-gradient(${parts.join(",")})`;}

function vDSR(){
  return `<h2>📚 DSR Rate Book</h2><p class="sub">Browse CPWD & Bihar DSR 2024 schedule of rates used for cost estimation</p>
  <div class="card" style="margin-bottom:18px"><div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center">
    <div style="display:flex;border:1px solid var(--border);border-radius:9px;overflow:hidden">
      <button class="btn" style="border-radius:0;background:${STATE.dsrSource==='cpwd'?'#2563eb':'var(--muted)'};color:${STATE.dsrSource==='cpwd'?'#fff':'var(--fg)'}" onclick="STATE.dsrSource='cpwd';render()">CPWD 2024</button>
      <button class="btn" style="border-radius:0;background:${STATE.dsrSource==='bihar'?'#16a34a':'var(--muted)'};color:${STATE.dsrSource==='bihar'?'#fff':'var(--fg)'}" onclick="STATE.dsrSource='bihar';render()">Bihar 2024</button>
    </div>
    <select style="width:auto" onchange="STATE.dsrCat=this.value;renderDsrTable()" id="dsrCat"><option value="">All Categories</option>${[...new Set((STATE.dsrSource==='bihar'?BIHAR_RATES:CPWD_RATES).map(r=>r.category))].map(c=>`<option value="${c}" ${STATE.dsrCat===c?'selected':''}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join("")}</select>
    <input style="flex:1;min-width:200px" placeholder="🔍 Search DSR items..." value="${STATE.dsrSearch}" oninput="STATE.dsrSearch=this.value;renderDsrTable()"/>
  </div></div>
  <div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto" id="dsrTableWrap"></div></div>
  <div class="grid g3" style="margin-top:16px">
    <div class="note note-blue" style="margin:0">👷 <strong>Labor:</strong> Skilled & unskilled rates per minimum wages</div>
    <div class="note note-blue" style="margin:0;background:#f0fdf4;color:#15803d;border-color:#bbf7d0">📦 <strong>Material:</strong> Market rates incl. transportation</div>
    <div class="note note-amber" style="margin:0">🚜 <strong>Equipment:</strong> Machinery hire incl. fuel & operator</div>
  </div>`;
}
function renderDsrTable(){
  const wrap=document.getElementById("dsrTableWrap");if(!wrap)return;
  let rates=(STATE.dsrSource==="bihar"?BIHAR_RATES:CPWD_RATES);
  if(STATE.dsrCat)rates=rates.filter(r=>r.category===STATE.dsrCat);
  if(STATE.dsrSearch){const s=STATE.dsrSearch.toLowerCase();rates=rates.filter(r=>r.description.toLowerCase().includes(s)||r.itemCode.toLowerCase().includes(s)||r.category.includes(s));}
  wrap.innerHTML=`<table><thead><tr><th>Code</th><th>Description</th><th>Chapter</th><th>Category</th><th>Unit</th><th class="tr">Rate</th><th class="tr">Labor</th><th class="tr">Material</th><th class="tr">Equip.</th></tr></thead><tbody>
  ${rates.map(r=>`<tr><td style="font-family:monospace;font-size:12px;color:#2563eb;font-weight:600">${r.itemCode}</td><td style="max-width:280px">${r.description}</td><td style="color:var(--muted-fg)">${r.chapter}</td><td><span class="pill" style="background:${CAT_COLORS[r.category]}22;color:${CAT_COLORS[r.category]}">${r.category}</span></td><td style="color:var(--muted-fg)">${r.unit}</td><td class="tr" style="font-weight:700">${fmtINR(r.rate)}</td><td class="tr" style="color:#16a34a">${r.laborRate?fmtINR(r.laborRate):'-'}</td><td class="tr" style="color:#2563eb">${r.materialRate?fmtINR(r.materialRate):'-'}</td><td class="tr" style="color:#ca8a04">${r.equipmentRate?fmtINR(r.equipmentRate):'-'}</td></tr>`).join("")}
  </tbody></table>${rates.length?'':'<div style="padding:40px;text-align:center;color:var(--muted-fg)">No rates found matching your criteria</div>'}`;
}

const empty=(ic,t,d,btn,panel)=>`<div style="text-align:center;padding:80px 20px"><div style="font-size:50px;opacity:.4">${ic}</div><h2 style="margin-top:16px">${t}</h2><p class="sub" style="margin-top:6px">${d}</p><button class="btn btn-primary" onclick="nav('${panel}')">${btn}</button></div>`;

/* ---------- EXPORTS ---------- */
function exportAnalysis(){
  const r=STATE.result;if(!r)return;
  const wb=XLSX.utils.book_new();
  const sum=[["Infinity Bid — BOQ Analysis Report"],["Project",r.projectName],["DSR Source",r.source.toUpperCase()+" 2024"],["BOQ Items",r.itemCount],[],["Cost Summary",""],["Material Cost",r.summary.materialCost],["Labor Cost",r.summary.laborCost],["Equipment Cost",r.summary.equipmentCost],["Overhead & Profit",r.summary.overheadCost],["Total Estimated Cost",Math.round(r.summary.estimatedCost)]];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sum),"Summary");
  const mh=[["Material","Category","Quantity","Unit","Rate","Wastage %","Total Qty","Amount"]];
  r.materials.forEach(m=>mh.push([m.materialName,m.category,m.quantity,m.unit,m.rate,m.wastagePercent,m.totalWithWastage,m.amount]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(mh),"Materials");
  XLSX.writeFile(wb,"infinity-bid-analysis.xlsx");
}
function exportDPR(){
  const d=STATE.dpr;if(!d)return;
  const wb=XLSX.utils.book_new();
  const rows=[["Infinity Bid — Financial DPR"],["Total Budget",d.projectSummary.totalBudget],["Daily Budget",d.projectSummary.dailyBudget],["Duration (days)",d.projectSummary.duration],[],["Day","Date","Planned","Actual","Cumulative Planned","Cumulative Actual","Progress %","Variance"]];
  d.dprEntries.forEach(e=>rows.push([e.day,e.date,e.planned,e.actual,e.cumP,e.cumA,e.progress,e.variance]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),"Financial DPR");
  XLSX.writeFile(wb,"infinity-bid-dpr.xlsx");
}

/* ---------- INIT ---------- */
render();
</script>
</body>
</html>
